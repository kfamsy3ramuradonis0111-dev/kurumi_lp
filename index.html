  <style>
    :root {
      --bg: #fbf8f3;

      --brown: #7c6658;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--bg); }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--brown);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
    }
    .lp {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      background: var(--bg);
      overflow: hidden;
      box-shadow: 0 0 24px rgba(95, 68, 56, .08);
    }
    .section {
      position: relative;
      width: 100%;
      line-height: 0;
      background: var(--bg);
    }
    .section.video {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--pink-bg);
    }
    .section.video video {
  width: 100%;
  height: 100svh;
  object-fit: cover;
  display: block;
  background: var(--pink-bg);
　　}
      
      
      
      
      
    
    .section img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .scroll-hint {
      position: absolute;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: rgba(126, 101, 90, .78);
      font-size: 12px;
      line-height: 1;
      letter-spacing: .18em;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.42);
      backdrop-filter: blur(8px);
    }
    .hotspot {
      position: absolute;
      display: block;
      z-index: 5;
      border-radius: 999px;
      background: transparent;
      -webkit-tap-highlight-color: rgba(255, 190, 205, .22);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
